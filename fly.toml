# fly.toml — Fly.io app configuration
# Deploy: fly launch → fly deploy

app = "xauusd-ai-bot"
primary_region = "sin"  # Singapore — change to your nearest region

[build]
  dockerfile = "Dockerfile"

[env]
  PYTHONUNBUFFERED = "1"
  TZ = "UTC"

# No HTTP service needed — this is a polling bot, not a webhook
# But we add a tiny health endpoint to keep Fly from killing the app

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1