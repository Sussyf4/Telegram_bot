# render.yaml — place in project root
# This tells Render exactly how to build and run everything

databases:
  - name: xauusd-bot-db
    plan: free
    databaseName: xauusd_bot
    user: botuser

services:
  - type: worker
    name: xauusd-ai-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TWELVEDATA_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: xauusd-bot-db
          property: connectionString
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TZ
        value: "UTC"